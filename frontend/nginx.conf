server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — все пути отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE proxy — Server-Sent Events endpoint (M-008).
    # proxy_buffering MUST be off, otherwise nginx holds frames until the
    # response buffer fills up — the client would only see heartbeats.
    # proxy_read_timeout 3600s keeps the connection open for an hour before
    # nginx force-closes (the SSE endpoint itself sends :ping heartbeats).
    location /api/v1/events/stream {
        proxy_pass             http://api:8000;
        proxy_http_version     1.1;
        proxy_set_header       Connection        '';
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        chunked_transfer_encoding on;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
    }

    # API proxy → FastAPI
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # для AI анализа который долго думает
    }

    location /health {
        proxy_pass http://api:8000;
    }

    location /docs {
        proxy_pass http://api:8000;
    }
}
